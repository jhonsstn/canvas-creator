services:
  backend:
    build: ./backend
    container_name: canvas_creator_backend
    volumes:
      - canvas_storage:/app/storage
    networks:
      - canvas_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: canvas_creator_frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - canvas_net
    restart: unless-stopped

networks:
  canvas_net:
    driver: bridge

volumes:
  canvas_storage:
